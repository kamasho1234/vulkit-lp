<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>SECURE CHECKOUT｜VULKIT VBP101</title>
    <meta name="description" content="VULKIT VBP101の先行予約決済ページです。Stripeの安全な決済画面へ進みます。">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="checkout-status-page secure-checkout-page">
    <main class="secure-checkout-shell">
      <a class="secure-checkout-back" href="/">LPへ戻る</a>

      <section class="checkout-options secure-checkout-options" id="checkout-options" aria-label="先行予約の購入数選択">
        <div class="checkout-options__head">
          <p>SECURE CHECKOUT</p>
          <h2>先行予約の購入数を選択</h2>
          <span>Stripeの安全な決済画面で、カード・各種決済へ進みます。</span>
        </div>
        <div class="checkout-plan-grid">
          <button class="checkout-plan-card" type="button" data-checkout-plan="single" data-cta-location="secure_checkout_single">
            <span>1個購入</span>
            <strong>29,800円</strong>
            <small>5,000円特典割引を適用</small>
            <em>1個で予約する</em>
          </button>
          <button class="checkout-plan-card checkout-plan-card--best" type="button" data-checkout-plan="double" data-cta-location="secure_checkout_double">
            <span>2個購入</span>
            <strong>54,600円</strong>
            <small>15,000円特典割引 / 1個あたり27,300円</small>
            <em>2個で予約する</em>
          </button>
        </div>
        <p class="checkout-options__note">送料無料。発送は2026年6月22日より順次予定しています。</p>
      </section>

      <p class="secure-checkout-support">
        決済前のご相談は
        <a href="https://lin.ee/Qi4NUTn" target="_blank" rel="noopener noreferrer">VULKIT VBP101公式LINE</a>
        からお問い合わせください。
      </p>
    </main>
    <script src="/tracking.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
